---
- name: Create GitHub webhook secret
  kubernetes.core.k8s:
    state: present
    server_side_apply:
      field_manager: ansible
      force_conflicts: true
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: github-webhook-secret
        namespace: "{{ dav_namespace }}"
      type: Opaque
      stringData:
        secret: "{{ vault_github_webhook_secret }}"

# --- Review Console secrets ---

- name: Create review console Postgres credentials secret
  kubernetes.core.k8s:
    state: present
    server_side_apply:
      field_manager: ansible
      force_conflicts: true
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: dav-review-db-creds
        namespace: "{{ dav_namespace }}"
        labels:
          app: dav-review
          component: review-console-db
      type: Opaque
      stringData:
        database-name: "{{ review_console_db_name }}"
        database-user: "{{ review_console_db_user }}"
        database-password: "{{ vault_review_console_db_password }}"
        dsn: "postgresql://{{ review_console_db_user }}:{{ vault_review_console_db_password }}@dav-review-db:5432/{{ review_console_db_name }}"

- name: Create review console oauth-proxy session secret
  kubernetes.core.k8s:
    state: present
    server_side_apply:
      field_manager: ansible
      force_conflicts: true
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: dav-review-ui-session
        namespace: "{{ dav_namespace }}"
        labels:
          app: dav-review
          component: review-console-ui
      type: Opaque
      stringData:
        session-secret: "{{ vault_review_console_session_secret }}"
  when: review_console_enable_oauth | bool
