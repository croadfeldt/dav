gaps_identified:
  - description: >
      No password reset flow is specified in v1.0.
    severity:
      label: moderate
      score: 55
      band: medium
      factors:
        base_from_label: 50
        override_rationale: "Missing reset is explicitly acknowledged in spec; severity reflects user experience impact, not hidden gap"
    confidence:
      label: high
      score: 85
      band: very_high
      factors:
        base_from_label: 85
        override_rationale: null
    rationale: >
      Doc 03 §3.4 explicitly defers password reset to v1.1. This is a real
      gap in the user-experience sense (locked-out users must contact an
      admin) but it is not a hidden gap — it's acknowledged in the spec.
    recommendation: >
      Keep the v1.0 scope limit but add a note in the login error response
      so users know how to recover a lost password (contact admin).
    spec_refs_consulted:
      - "03-authentication.md/Password reset"
    spec_refs_missing: null             # Not missing; explicitly deferred

  - description: >
      The spec does not specify timing-attack-resistant comparison for password verification.
    severity:
      label: minor
      score: 30
      band: low
      factors:
        base_from_label: 30
        override_rationale: null
    confidence:
      label: medium
      score: 50
      band: medium
      factors:
        base_from_label: 50
        override_rationale: null
    rationale: >
      Doc 03 §3.2 mentions bcrypt verification but does not explicitly state
      that the comparison is constant-time. bcrypt implementations typically
      are constant-time internally, but the spec should make the requirement
      explicit to prevent future drift if the hash algorithm changes.
    recommendation: >
      Add a sentence to Doc 03 §3.2 noting that password verification must
      use a constant-time comparison to prevent timing-based credential
      enumeration.
    spec_refs_consulted:
      - "03-authentication.md/Login"
    spec_refs_missing: "Explicit constant-time-comparison requirement"

summary:
  verdict: supported
  overall_confidence:
    label: high
    score: 83
    band: very_high
    factors:
      base_from_label: 85
      override_rationale: "Two documented gaps (one acknowledged deferral, one minor spec omission) warrant slight confidence dampening"
  notes: >
    TinyURL's authentication spec describes a coherent login flow with
    appropriate components (user lookup, suspension check, password
    verification, session issuance, rate limiting). The flow is
    internally consistent. Two gaps remain: password reset is explicitly
    deferred to v1.1 (moderate severity), and constant-time comparison is
    not explicitly required (minor severity). Neither blocks the scenario.

