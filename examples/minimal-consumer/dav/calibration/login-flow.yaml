components_required:
  - id: user_lookup_by_email
    role: Retrieves the User record for the email submitted at login.
    confidence:
      label: high
      score: 85
      band: very_high
      factors:
        base_from_label: 85
        override_rationale: null
    rationale: >
      Doc 03 §3.2 step 2 describes "System looks up User by email" — a clear
      component boundary.
    spec_refs:
      - "03-authentication.md/Login"

  - id: suspension_check
    role: Refuses login for suspended accounts without checking the password.
    confidence:
      label: high
      score: 85
      band: very_high
      factors:
        base_from_label: 85
        override_rationale: null
    rationale: >
      Doc 03 §3.2 step 3 is explicit: "If is_suspended, return 403 without
      checking password."
    spec_refs:
      - "03-authentication.md/Login"

  - id: password_verification
    role: Verifies submitted password against bcrypt hash in the User record.
    confidence:
      label: high
      score: 85
      band: very_high
      factors:
        base_from_label: 85
        override_rationale: null
    rationale: >
      Doc 03 §3.2 step 4 specifies bcrypt verification; Doc 03 §3.1 confirms
      bcrypt with cost factor 12 is used at registration.
    spec_refs:
      - "03-authentication.md/Login"
      - "03-authentication.md/Registration"

  - id: session_issuance
    role: Issues a signed session cookie on successful authentication.
    confidence:
      label: high
      score: 85
      band: very_high
      factors:
        base_from_label: 85
        override_rationale: null
    rationale: >
      Doc 03 §3.2 step 5 describes session issuance; Doc 03 §3.3 elaborates
      on cookie signing and 7-day validity.
    spec_refs:
      - "03-authentication.md/Login"
      - "03-authentication.md/Session"

  - id: rate_limiter
    role: Throttles login attempts to prevent brute-force credential guessing.
    confidence:
      label: high
      score: 85
      band: very_high
      factors:
        base_from_label: 85
        override_rationale: null
    rationale: >
      Doc 03 §3.5 specifies 5 attempts per email per 15 minutes.
    spec_refs:
      - "03-authentication.md/Rate limiting"

